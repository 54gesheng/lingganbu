<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>灵感簿</title>
<style>
  :root {
    --bg: #0b0b0d;
    --card: #151518;
    --card-hover: #1c1c20;
    --accent: #c8a45c;
    --accent-light: #ddb87a;
    --accent-dim: #8a7140;
    --accent-glow: rgba(200,164,92,0.08);
    --text: #e8e6e3;
    --text-dim: #7a7780;
    --text-faint: #4a4850;
    --border: #222226;
    --border-light: #2e2e33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header ===== */
  header {
    background: rgba(11,11,13,0.92);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .header-title .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-dim);
  }

  .header-title span {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text);
  }

  .header-count {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .header-count .num {
    color: var(--accent);
    font-weight: 700;
  }

  .search-box {
    flex: 1;
    max-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px 6px 32px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: all 0.2s;
  }

  .search-box input::placeholder { color: var(--text-faint); }
  .search-box input:focus { border-color: var(--accent-dim); background: var(--card-hover); }

  .search-box::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--text-faint);
    border-radius: 50%;
  }

  .search-box::after {
    content: "";
    position: absolute;
    left: 21px;
    top: 17px;
    width: 5px;
    height: 1.5px;
    background: var(--text-faint);
    transform: rotate(45deg);
  }

  /* ===== Main ===== */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 20px 40px;
  }

  /* ===== Entry List ===== */
  .entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.25s ease;
    animation: fadeIn 0.3s ease;
  }

  .entry:hover {
    border-color: var(--border-light);
    background: var(--card-hover);
  }

  .entry.expanded {
    border-color: var(--accent-dim);
    background: var(--card-hover);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Entry Summary (collapsed) ===== */
  .entry-summary {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .entry-icons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    font-size: 14px;
  }

  .entry-title {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry.expanded .entry-title {
    color: var(--accent-light);
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .entry-time {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.5px;
  }

  .entry-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-pending { background: var(--accent); }
  .status-published { background: #6fa67e; }
  .status-shelved { background: var(--text-faint); }

  .entry-arrow {
    color: var(--text-faint);
    font-size: 12px;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .entry.expanded .entry-arrow {
    transform: rotate(90deg);
    color: var(--accent);
  }

  /* ===== Entry Detail (expanded) ===== */
  .entry-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .entry.expanded .entry-detail {
    max-height: 2000px;
  }

  .entry-detail-inner {
    padding: 0 20px 20px;
  }

  .entry-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .tag-driving { background: rgba(200,164,92,0.12); color: var(--accent-light); }
  .tag-business { background: rgba(74,124,89,0.12); color: #6fa67e; }
  .tag-human { background: rgba(180,100,100,0.12); color: #c78a8a; }
  .tag-lifestyle { background: rgba(100,120,160,0.12); color: #8a9ec7; }
  .tag-creative { background: rgba(150,100,180,0.12); color: #a87ec7; }

  .entry-divider {
    height: 1px;
    background: linear-gradient(to right, var(--border-light), transparent);
    margin-bottom: 14px;
  }

  .entry-content {
    color: var(--text);
    font-size: 14px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .entry-status-label {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }

  .empty-state .icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 14px;
  }

  .empty-state .hint {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  /* ===== Footer ===== */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 2px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .header-title span { font-size: 15px; }
    .search-box { max-width: 140px; }
    main { padding: 12px 16px 32px; }
    .entry-summary { padding: 14px 16px; }
    .entry-detail-inner { padding: 0 16px 16px; }
    .entry-title { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      <span class="dot"></span>
      <span>灵感簿</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索…" oninput="applyFilters()">
    </div>
    <div class="header-count">共 <span class="num" id="totalCount">0</span> 条</div>
  </div>
</header>

<main>
  <div id="entryList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🏎️</div>
    <p>没有匹配的灵感</p>
    <p class="hint">试试其他搜索词</p>
  </div>
</main>

<footer>ASTON MARTIN POV</footer>

<script>
  // ===== 版本号 =====
  const PAGE_VERSION = "20260714_1233";

  (function() {
    const url = new URL(window.location.href);
    const v = url.searchParams.get('_v');
    if (v !== PAGE_VERSION) {
      url.searchParams.set('_v', PAGE_VERSION);
      window.location.replace(url.toString());
      return;
    }
  })();

  // ===== 灵感数据 =====
  const entries = [
    {
      date: "2026-07-14 01:43",
      title: "All-in",
      content: "德州扑克里有一种打法叫 All-in——核心就八个字：看见机会，倾囊而出。\n\n平时可以蛰伏，可以观望，可以慢慢耗——但机会一旦显现，就要全力出击，不留退路。这不是赌，是判断力到了之后的果决。\n\n打牌如此，职业如此，人生亦如此。\n\n你的时间、精力、青春，就是手上的筹码。筹码有限，不可能每把都跟。大部分时候你在等待、在观察、在积蓄。但当那手牌出现——那张你等的牌——犹豫一秒都是对筹码的浪费。\n\n人生只有一次，没有重新发牌。所以该蛰伏时沉得住气，该出击时下得了手。\n\nAll-in 不是冲动，是蓄谋已久的果断。人生也要 All-in。",
      tags: ["human", "lifestyle"],
      status: "pending"
    },
    {
      date: "2026-07-14 01:58",
      title: "止痛药",
      content: "宇多田光被问到：为什么人在与某人分开时会感到痛苦？\n\n她回答：「原本就有痛苦，那个人存在本身就是止痛药。」\n\n——这才是真正的清醒。\n\n精英的成长路径里，几乎都会遇到一个人：你很爱 TA，TA 也很爱你。TA 曾替你止住了生活里那些隐秘的疼痛，让你以为世界本该如此温柔。\n\n但成长的方向、速度、轨道终会分岔。你不得不和这样的人说再见。\n\n不是因为不爱了，是因为往前走的路只够一个人通过。\n\n所以——\n\n感激那个替你止过痛的人，那段日子是真的不疼了。\n\n习惯生活的别离，成长就是不断挥手，不多解释。\n\n珍惜过往，它已经长进你的骨骼，谁也拿不走。\n\n期待未来的生活，下一段路，会有新的风景、新的相遇。\n\n止痛药停了，不代表痛苦回来了。代表你已经足够强壮，可以带着记忆继续往前走了。",
      tags: ["human", "lifestyle"],
      status: "pending"
    },
    {
      date: "2026-07-14 10:58",
      title: "换道超车",
      content: "大家都爱说\"弯道超车\"。\n\n但开过车的人都知道——弯道超车是最危险的动作。视线受阻、抓地力下降、方向盘还在调整，这时候变道等于拿命赌。\n\n真正懂驾驶的人，超车不在弯道做。直线、视野清晰、路面条件允许，一脚油门干净利落。\n\n商业也一样。\n\n弯道超车的本质是：在同一条赛道上，用更冒险的方式抢位置。对手看得到你在干什么，路就那么宽，稍微失误就是双输。\n\n真正有效的超车是换道——不在同一条赛道上硬挤，而是另辟蹊径，换一个维度。\n\n别人拼价格，你拼体验。别人拼规模，你拼精度。别人在红海里贴身肉搏，你已经在新赛道上独自加速。\n\n弯道超车是冒险，换道超车是判断。\n\n驾驶如此，商业如此。真正的高手不在弯道搏命，在直道换道，然后一脚油门，扬长而去。",
      tags: ["driving", "business"],
      status: "pending"
    }
  ];

  // ===== 标签映射 =====
  const tagMap = {
    driving: "🏎️",
    business: "💼",
    human: "🧠",
    lifestyle: "🍷",
    creative: "🎬"
  };

  const tagLabelMap = {
    driving: "驾驶漫谈",
    business: "商业洞察",
    human: "人性思考",
    lifestyle: "生活方式",
    creative: "内容创意"
  };

  const statusLabelMap = {
    pending: "⏳ 待开发",
    published: "✅ 已发布",
    shelved: "📦 已搁置"
  };

  // ===== 搜索 =====
  let searchTerm = '';

  function applyFilters() {
    searchTerm = document.getElementById('searchInput').value.toLowerCase();
    render();
  }

  // ===== 展开/收起 =====
  function toggleEntry(id) {
    const el = document.getElementById('entry-' + id);
    if (el) el.classList.toggle('expanded');
  }

  // ===== 渲染 =====
  function render() {
    const list = document.getElementById('entryList');
    const emptyState = document.getElementById('emptyState');

    document.getElementById('totalCount').textContent = entries.length;

    let filtered = entries.filter(e => {
      if (searchTerm) {
        const haystack = (e.title + ' ' + e.content + ' ' + e.date).toLowerCase();
        if (!haystack.includes(searchTerm)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }

    emptyState.style.display = 'none';
    list.innerHTML = filtered.map((e, i) => {
      const id = entries.indexOf(e);
      const icons = e.tags.map(t => tagMap[t] || '').join(' ');
      const tagsHtml = e.tags.map(t => 
        `<span class="tag tag-${t}">${tagMap[t]} ${tagLabelMap[t] || t}</span>`
      ).join('');
      const timeStr = e.date.substring(5, 16).replace('-', '/').replace(' ', ' · ');
      
      return `
        <div class="entry" id="entry-${id}" onclick="toggleEntry(${id})">
          <div class="entry-summary">
            <div class="entry-icons">${icons}</div>
            <div class="entry-title">${escapeHtml(e.title)}</div>
            <div class="entry-meta">
              <span class="entry-time">${timeStr}</span>
              <span class="entry-status-dot status-${e.status}"></span>
              <span class="entry-arrow">›</span>
            </div>
          </div>
          <div class="entry-detail">
            <div class="entry-detail-inner">
              <div class="entry-tags">${tagsHtml}</div>
              <div class="entry-divider"></div>
              <div class="entry-content">${escapeHtml(e.content)}</div>
              <div class="entry-status-label">${statusLabelMap[e.status] || ''}</div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  render();
</script>

</body>
</html>
